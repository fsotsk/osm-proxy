user www-data;
worker_processes auto;
worker_rlimit_nofile 100000;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- LOGGING (оптимизировано) ---
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main buffer=512k flush=1m;

    # --- PERFORMANCE ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 10000;

    # --- GZIP (только текст) ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
    gzip_min_length 1024;

    # --- DNS resolver (ВАЖНО) ---
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- CACHE ---
    proxy_cache_path /data/cache_osm
        levels=1:2
        keys_zone=osm:100m
        max_size=50g
        inactive=30d
        use_temp_path=off;

    proxy_cache_key "$scheme://$host$request_uri";

    # --- RATE LIMIT (защита от бана) ---
    limit_req_zone $binary_remote_addr zone=osm_limit:10m rate=10r/s;

    # --- UPSTREAM ---
    upstream openstreetmap {
        server tile.openstreetmap.org:443;
        keepalive 32;
    }

    server {
        listen 80 reuseport default_server;

        # --- LIMIT ---
        limit_req zone=osm_limit burst=20 nodelay;

        # --- CACHE SETTINGS ---
        proxy_cache osm;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_background_update on;

        proxy_cache_use_stale
        error timeout updating
        http_500 http_502 http_503 http_504
        http_403 http_404 http_429;

        proxy_cache_valid 200 302 30d;
        proxy_cache_valid 301 1h;
        proxy_cache_valid any 1m;

        # --- TIMEOUTS ---
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # --- HEADERS CLEANUP ---
        proxy_hide_header Set-Cookie;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Expect-Ct;
        proxy_hide_header Via;
        proxy_hide_header X-*;

        proxy_ignore_headers Cache-Control Set-Cookie;

        # --- RETRIES ---
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # --- RESPONSE HEADERS ---
        expires 30d;
        add_header X-Cache-Status $upstream_cache_status always;

        location ~ ^/street {
            rewrite ^/street(.*)$ $1 break;

            proxy_pass https://openstreetmap;

            # --- HTTPS upstream ---
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_ssl_name tile.openstreetmap.org;

            # --- HOST ---
            proxy_set_header Host tile.openstreetmap.org;

            # --- KEEPALIVE ---
            proxy_set_header Connection "";

            # --- CLEAN HEADERS ---
            proxy_set_header Referer "https://www.openstreetmap.org/";
            proxy_set_header Origin "https://www.openstreetmap.org";
            proxy_set_header Cookie "";

            proxy_set_header Forwarded "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Host "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_set_header X-Forwarded-Port "";
            proxy_set_header X-Real-IP "";
            proxy_set_header Via "";

            # --- OPTIONAL (маскировка) ---
            proxy_set_header User-Agent "Mozilla/5.0 (compatible; nginx-tile-cache)";
        }
    }
}